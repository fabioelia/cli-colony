appId: com.claude-colony.app
productName: Claude Colony
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - "!node_modules/**/*"
  - node_modules/node-pty/**/*
  - node_modules/uuid/**/*
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  icon: resources/icon.png
  artifactName: "${productName}-${version}-${arch}.${ext}"
dmg:
  artifactName: "${productName}-${version}.${ext}"
npmRebuild: true
asar: true
asarUnpack:
  - "node_modules/node-pty/**"
# Auto-update provider — GitHub releases.
# TODO: confirm the actual repo owner/name before the first release cut.
# electron-updater will fetch the latest release artifact from this repo.
publish:
  provider: github
  owner: fabioelia
  repo: claude-electron
